<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">
    <h2>🔐 Password Generator</h2>

    <input type="text" id="password" readonly>

    <div class="options">
        <label>Password Length:
            <input type="number" id="length" value="12" min="4" max="30">
        </label>

        <label><input type="checkbox" id="uppercase" checked> Include Uppercase</label>
        <label><input type="checkbox" id="numbers" checked> Include Numbers</label>
        <label><input type="checkbox" id="symbols" checked> Include Symbols</label>
    </div>

    <button onclick="generatePassword()">Generate Password</button>
    <button class="copy-btn" onclick="copyPassword()">Copy Password</button>
</div>

<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Menu</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* BODY BACKGROUND IMAGE */

body{
background-image:url("https://images.unsplash.com/photo-1509042239860-f550ce710b93");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* dark overlay */

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:-1;
}

/* menu card */

.menu{
background:#fff8e1;
width:400px;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
text-align:center;
}

/* title */

.menu h1{
color:#4e342e;
margin-bottom:10px;
}

.menu p{
color:#6d4c41;
margin-bottom:20px;
font-size:14px;
}

/* section title */

.section-title{
margin-top:20px;
margin-bottom:10px;
font-size:20px;
color:#3e2723;
border-bottom:2px solid #a1887f;
padding-bottom:5px;
}

/* menu items */

.item{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px dashed #bcaaa4;
}

.item span{
font-weight:bold;
color:#5d4037;
}

/* hover */

.item:hover{
background:#efebe9;
cursor:pointer;
}

</style>

</head>

<body>

<div class="menu">

<h1>☕ Coffee Menu</h1>
<p>Freshly Brewed Coffee</p>

<div class="section-title">Coffee</div>

<div class="item">
<p>Espresso</p>
<span>$2.50</span>
</div>

<div class="item">
<p>Cappuccino</p>
<span>$3.50</span>
</div>

<div class="item">
<p>Latte</p>
<span>$3.00</span>
</div>

<div class="item">
<p>Mocha</p>
<span>$3.75</span>
</div>

<div class="section-title">Desserts</div>

<div class="item">
<p>Chocolate Cake</p>
<span>$4.00</span>
</div>

<div class="item">
<p>Donut</p>
<span>$2.00</span>
</div>

<div class="item">
<p>Brownie</p>
<span>$3.25</span>
</div>

</div>

</body>
</html>

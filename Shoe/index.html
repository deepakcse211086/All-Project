<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoe Product</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* main container */

.main{

position:relative;

width:90%;

max-width:1100px;

padding:60px;

border-radius:20px;

background:linear-gradient(to right,#ff7e5f,#feb47b);

box-shadow:0 20px 40px rgba(0,0,0,0.3);

display:flex;

align-items:center;

justify-content:space-between;

overflow:hidden;

}

/* text content */

.content{
width:45%;
color:white;
}

.content h1{
font-size:45px;
margin-bottom:20px;
}

.pointers{
margin-top:15px;
line-height:1.7;
font-size:16px;
}

/* shoe image */

.shoe{
position:absolute;
right:120px;
top:50%;
transform:translateY(-50%);
transition:0.5s;
}

.shoe img{
width:420px;
transition:0.5s;
}

/* hover animation */

.main:hover .shoe img{
transform:scale(1.15) rotate(-5deg);
}

/* responsive */

@media (max-width:768px){

.main{
flex-direction:column;
text-align:center;
padding:40px;
}

.content{
width:100%;
}

.shoe{
position:relative;
right:0;
top:0;
transform:none;
margin-top:30px;
}

.shoe img{
width:280px;
}

}

</style>

</head>

<body>

<div class="main">

<div class="content">

<h1>Shoe - 1</h1>

<p class="pointers">
Lorem ipsum dolor sit amet consectetur adipisicing elit. 
Amet at blanditiis saepe adipisci molestiae neque quisquam 
perferendis repudiandae repellendus odio.
</p>

<p class="pointers">
Lorem ipsum dolor sit amet consectetur adipisicing elit. 
Rem, dolore.
</p>

</div>

<div class="shoe">
<img src="https://priyanshu-240499.github.io/Assignments-CSS/position/assets/shoe-1.png">
</div>

</div>

</body>
</html>

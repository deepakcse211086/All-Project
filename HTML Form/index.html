<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* form container */

fieldset{
width:450px;
background:white;
padding:30px;
border-radius:12px;
border:none;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

legend{
font-size:22px;
font-weight:bold;
padding:5px 15px;
background:#764ba2;
color:white;
border-radius:6px;
}

/* labels */

label{
font-weight:bold;
font-size:14px;
}

/* inputs */

input,select,textarea{

width:100%;
padding:10px;
margin-top:6px;
margin-bottom:15px;

border:1px solid #ccc;
border-radius:6px;

outline:none;

transition:0.3s;

}

input:focus,select:focus,textarea:focus{
border-color:#764ba2;
box-shadow:0 0 5px rgba(118,75,162,0.5);
}

/* radio buttons */

.gender{
display:flex;
gap:20px;
margin-bottom:15px;
}

/* buttons */

.buttons{
display:flex;
justify-content:space-between;
}

input[type="submit"]{
background:#764ba2;
color:white;
border:none;
cursor:pointer;
}

input[type="submit"]:hover{
background:#5a3490;
}

input[type="reset"]{
background:#e74c3c;
color:white;
border:none;
cursor:pointer;
}

input[type="reset"]:hover{
background:#c0392b;
}

</style>

</head>

<body>

<form>

<fieldset>

<legend>Personal Details</legend>

<label>Firstname</label>
<input type="text" name="fname">

<label>Middlename</label>
<input type="text" name="mname">

<label>Lastname</label>
<input type="text" name="lname">

<label>Course</label>
<select name="course">
<option>BCA</option>
<option>BBA</option>
<option>B-Tech</option>
<option>MBA</option>
<option>MCA</option>
<option>M-Tech</option>
</select>

<label>Gender</label>

<div class="gender">
<label><input type="radio" name="gender"> Male</label>
<label><input type="radio" name="gender"> Female</label>
<label><input type="radio" name="gender"> Others</label>
</div>

<label>DOB</label>
<input type="date">

<label>Phone</label>
<input type="tel">

<label>Address</label>
<textarea rows="3"></textarea>

<label>Email</label>
<input type="email">

<label>Password</label>
<input type="password">

<label>Re-type Password</label>
<input type="password">

<label>
<input type="checkbox"> Agree to terms and conditions
</label>

<br><br>

<label>Select File</label>
<input type="file">

<label>Choose Color</label>
<input type="color">

<div class="buttons">

<input type="reset" value="Reset">

<input type="submit" value="Submit">

</div>

</fieldset>

</form>

</body>
</html>
